<style>
  :root{--bg:#fff;--ink:#111;--muted:#6b7280;--line:#e5e7eb;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:var(--font);color:var(--ink);background:var(--bg)}
  #app{display:flex;flex-direction:column;height:100%}
  .topbar{height:56px;flex:0 0 56px;display:flex;align-items:center;gap:14px;
    padding:0 20px;border-bottom:1px solid var(--line);background:#fff;z-index:5}
  .topbar h1{font-size:15px;font-weight:700;margin:0;letter-spacing:-.2px;white-space:nowrap}
  .topbar .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:7px 12px;font-size:12.5px;cursor:pointer;
    color:#444;font-family:inherit;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:#111;color:#fff;font-weight:600}
  .badge{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 8px;white-space:nowrap}
  #map{flex:1;position:relative}
  .panel{position:absolute;z-index:10;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .ctrl{right:16px;top:16px;padding:11px 12px;font-size:12px;min-width:188px}
  .ctrl .grp{margin-bottom:9px}.ctrl .grp:last-child{margin-bottom:0}
  .ctrl label.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .ctrl select{width:100%;font-family:inherit;font-size:12.5px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;color:#111}
  .ctrl .chk{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12.5px;margin-top:7px}
  .ctrl .op{display:flex;align-items:center;gap:8px;color:var(--muted);margin-top:7px}
  .ctrl input[type=range]{width:88px;accent-color:#111}
  .sim{left:16px;top:16px;padding:11px 13px;max-width:236px;font-size:12px}
  .sim h3{margin:0 0 6px;font-size:12.5px;font-weight:700}
  .sim .hint{color:var(--muted);font-size:11.5px;line-height:1.5}
  .sim .selrow{margin-top:8px;font-size:11.5px}
  .sim .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .sim button{margin-top:9px;width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;
    color:#111;font-family:inherit;font-size:12px;padding:6px;cursor:pointer}
  .sim button:hover{background:#f8f9fa}
  .legend{left:16px;bottom:16px;padding:12px 14px;max-width:250px}
  .legend h2{font-size:12px;margin:0 0 9px;font-weight:700}
  .legend .row{display:flex;align-items:center;gap:8px;font-size:12px;margin:4px 0;color:#222}
  .legend .sw{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.10);flex:0 0 14px}
  .legend .note{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.5}
  .legend hr{border:0;border-top:1px solid var(--line);margin:9px 0}
  .bivar-grid{display:grid;grid-template-columns:auto repeat(3,20px);grid-template-rows:auto repeat(3,20px);gap:2px;align-items:center;margin:2px 0 4px}
  .bivar-grid .cell{width:20px;height:20px;border-radius:2px}
  .bivar-grid .axt{font-size:10px;color:var(--muted)}
  .bivar-grid .yl{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:var(--muted);justify-self:center}
  .pyramid{right:16px;bottom:100px;width:300px;padding:10px 12px;display:none}
  .pyramid .pt{font-size:12px;font-weight:700;margin-bottom:2px}
  .pyramid .ps{font-size:10.5px;color:var(--muted);margin-bottom:4px}
  #py-chart{width:100%;height:188px}
  .maplibregl-popup-content{font-family:var(--font);border-radius:8px;border:1px solid var(--line);box-shadow:0 4px 14px rgba(0,0,0,.10);padding:9px 11px}
  .pop-name{font-weight:700;font-size:13px}.pop-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .pop-k{color:var(--muted)}.pop-v{font-weight:600}.pop-row{font-size:12px;margin-top:2px}
  .toast{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:12;background:#111;color:#fff;font-size:12px;
    padding:7px 12px;border-radius:8px;display:none;max-width:80%}
  .search-box{position:relative}
  .search-box input{width:170px;font-family:inherit;font-size:12.5px;padding:6px 9px;
    border:1px solid var(--line);border-radius:7px;background:#fff;color:#111}
  .search-list{position:absolute;top:36px;right:0;width:240px;max-height:300px;overflow:auto;
    background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.10);z-index:20}
  .s-item{padding:7px 10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid #f1f3f5}
  .s-item:hover{background:#f8f9fa}
  .s-t{color:var(--muted);font-size:11px;float:right}
  .s-empty{padding:8px 10px;font-size:12px;color:var(--muted)}
  .ctrl-btn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 8px;
    font-size:11.5px;font-family:inherit;cursor:pointer;color:#111}
  .ctrl-btn:hover{background:#f8f9fa}
  .cov-stat{margin-top:6px;font-size:11.5px;color:#222;line-height:1.5}
  .cov-stat b{font-variant-numeric:tabular-nums}
  .cmp{right:16px;top:120px;width:280px;padding:10px 12px}
  .cmp-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;margin-bottom:6px}
  .cmp-head button{border:0;background:none;cursor:pointer;color:var(--muted);font-size:14px}
  .cmp-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
  .cmp-tbl th,.cmp-tbl td{padding:3px 5px;text-align:right;border-bottom:1px solid var(--line)}
  .cmp-tbl th{color:var(--muted);font-weight:600}
  .cmp-tbl td:first-child,.cmp-tbl th:first-child{text-align:left}
  .cmp-k{color:#444}.cmp-hint{font-weight:400;color:#bbb;font-size:10px}
  .cmp-good{color:#1a9850;font-weight:700}.cmp-bad{color:#dc2626}
  @media(max-width:720px){.cmp{display:none}}
  @media(max-width:720px){
    .topbar{flex-wrap:wrap;height:auto;flex:0 0 auto;padding:8px 12px;gap:8px}
    .topbar h1{font-size:13px;flex-basis:100%}
    .seg{flex-wrap:wrap}.seg button{padding:6px 9px;font-size:11.5px}
    .search-box input{width:130px}.badge{display:none}
    .ctrl{min-width:0;width:150px;right:8px;top:8px;padding:8px}
    .sim{max-width:190px;left:8px;top:8px}.pyramid{display:none!important}
    .legend{left:8px;bottom:8px;max-width:200px}
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>상급종합병원 접근성 · 고령화</h1>
    <div class="seg" id="view-seg">
      <button data-view="iso" class="on">접근성 등시선</button>
      <button data-view="bivar">접근성×고령화</button>
      <button data-view="aging">고령화지수</button>
      <button data-view="checkup">건강검진 수검률</button>
      <button data-view="cancer">암검진 수검률</button>
      <button data-view="er">응급 접근성</button>
      <button data-view="disease">유질환자율</button>
      <button data-view="metabolic">대사증후군</button>
    </div>
    <span class="spacer"></span>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="시군구·병원 검색" autocomplete="off"
             aria-label="시군구 또는 병원 검색" />
      <div class="search-list" id="searchList" hidden></div>
    </div>
    <span class="badge" id="badge-hosp">병원 47개소 · 제5기 공식</span>
  </div>
  <div id="map">
    <div class="panel sim" id="sim">
      <h3>커버리지 시뮬레이터</h3>
      <div class="hint"><b>병원</b> 클릭(여러 곳 동시) → 등시선 · <b>빈 곳</b> 클릭 → 가상 병원. 60분 커버 인구가 아래 집계됩니다.</div>
      <div class="selrow" id="sim-sel"></div>
      <button id="sim-clear">커버리지 지우기</button>
    </div>
    <div class="panel ctrl">
      <div class="grp">
        <label class="lbl">배경지도</label>
        <select id="basemap">
          <option value="carto-positron">밝은 지도 (CARTO)</option>
          <option value="carto-voyager">기본 지도 (CARTO)</option>
          <option value="osm">상세 지도 (OpenStreetMap)</option>
          <option value="carto-dark">어두운 지도 (CARTO)</option>
          <option value="vworld-base">VWorld 일반</option>
          <option value="vworld-white">VWorld 백지도</option>
          <option value="vworld-midnight">VWorld 야간</option>
          <option value="vworld-satellite">VWorld 위성+라벨</option>
        </select>
      </div>
      <div class="grp">
        <label class="chk"><input type="checkbox" id="toggle-sgg" checked /> 시군구 경계·이름</label>
        <label class="chk"><input type="checkbox" id="toggle-hosp" checked /> 병원 위치 표시</label>
        <label class="chk"><input type="checkbox" id="toggle-pyramid" /> 인구 피라미드(시군구 호버)</label>
        <label class="chk"><input type="checkbox" id="toggle-traffic" /> 교통반영 접근성(바이베리엇)</label>
        <label class="chk" id="er-tier-row" style="display:none"><input type="checkbox" id="toggle-ercenter" /> 센터급 기준(중증응급)</label>
        <div class="op"><span>채움 투명도</span><input type="range" id="opacity" min="20" max="95" value="60" /></div>
        <div class="op" style="gap:6px;margin-top:9px">
          <button type="button" id="myloc" class="ctrl-btn" title="내 위치 기준 최근접 상급종합병원">📍 내 위치 최근접</button>
          <button type="button" id="exportCsv" class="ctrl-btn" title="현재 시군구 지표를 CSV로">⬇ CSV</button>
        </div>
        <div class="op" style="margin-top:6px;color:var(--muted);font-size:11px">
          <b>Shift+클릭</b>으로 두 시군구 비교</div>
      </div>
    </div>
    <div class="panel legend" id="legend"></div>
    <div class="panel cmp" id="cmpPanel" hidden>
      <div class="cmp-head"><b>두 지역 비교</b>
        <button type="button" id="cmpClear" title="비교 초기화">✕</button></div>
      <div id="cmpBody"></div>
    </div>
    <div class="panel pyramid" id="pyramid">
      <div class="pt" id="py-title">시군구</div>
      <div class="ps">연령·성별 인구 (KOSIS 2026.06) · <span style="color:#3182bd">■</span>남 <span style="color:#e6550d">■</span>여</div>
      <div id="py-chart"></div>
      <a id="py-link" href="#" target="_blank" rel="noopener"
        style="display:none;font-size:11px;color:#3182bd;text-decoration:none;margin-top:4px">🔗 pop-pyramid에서 자세히(읍면동·비교·유사지역) ↗</a>
    </div>
    <div class="toast" id="toast"></div>
  </div>
</div>
<script>
const KEYS = window.MAP_KEYS || {};
const ISO_COLORS={15:'#1a9850',30:'#a6d96a',45:'#fee08b',60:'#fc8d59'};
const HOSPISO={15:'#08519c',30:'#3182bd',45:'#6baed6',60:'#c6dbef'};   // 선택 병원(파랑)
const PTISO={15:'#a63603',30:'#e6550d',45:'#fd8d3c',60:'#fdd0a2'};     // 가상 병원(주황)
const BIVAR={A1B1:'#e8e8e8',A1B2:'#dfb0d6',A1B3:'#be64ac',A2B1:'#ace4e4',A2B2:'#a5add3',
  A2B3:'#8c62aa',A3B1:'#5ac8c8',A3B2:'#5698b9',A3B3:'#3b4994'};
const AGING=['#fff7ec','#fdd49e','#fc8d59','#d7301f'];
const CHECKUP={C1:'#b2182b',C2:'#f4a582',C3:'#2166ac'};   // 수검률(빨강=낮음·취약 → 파랑=높음)
const SEVHI={C1:'#2166ac',C2:'#f4a582',C3:'#b2182b'};     // 질환부담(파랑=낮음 → 빨강=높음·취약)
const ERB={B1:'#1a9850',B2:'#a6d96a',B3:'#fee08b',B4:'#d73027'};  // 응급 접근(≤10/≤20/≤30/>30분)
const ERPT={'권역응급의료센터':'#7f0000','지역응급의료센터':'#d7301f','지역응급의료기관':'#737373'};
const checkupMatch=['match',['get','checkup_class'],'C1',CHECKUP.C1,'C2',CHECKUP.C2,'C3',CHECKUP.C3,'#e8e8e8'];
const classMatch=(field,pal)=>['match',['get',field+'_class'],'C1',pal.C1,'C2',pal.C2,'C3',pal.C3,'#e8e8e8'];
const isoMatch=pal=>['match',['get','minutes'],15,pal[15],30,pal[30],45,pal[45],60,pal[60],'#ccc'];
const bivarMatch=prop=>{const m=['match',['get',prop]];Object.entries(BIVAR).forEach(([k,v])=>m.push(k,v));m.push('#e8e8e8');return m;};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',4200);}

/* ---------- 배경지도 ---------- */
function vworldStyle(layer,hybrid){
  const k=KEYS.vworld,u=l=>`https://api.vworld.kr/req/wmts/1.0.0/${k}/${l}/{z}/{y}/{x}.${l==='Satellite'?'jpeg':'png'}`;
  const sources={vw:{type:'raster',tiles:[u(layer)],tileSize:256,attribution:'© VWorld'}};
  const layers=[{id:'vw',type:'raster',source:'vw'}];
  if(hybrid){sources.vwh={type:'raster',tiles:[u('Hybrid')],tileSize:256};layers.push({id:'vwh',type:'raster',source:'vwh'});}
  return {version:8,glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',sources,layers};
}
function osmStyle(){return {version:8,glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
  sources:{osm:{type:'raster',tiles:['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png','https://b.tile.openstreetmap.org/{z}/{x}/{y}.png','https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap'}},
  layers:[{id:'osm',type:'raster',source:'osm'}]};}
const CARTO=n=>`https://basemaps.cartocdn.com/gl/${n}/style.json`;
function basemapStyle(id){switch(id){
  case 'carto-voyager':return CARTO('voyager-gl-style');
  case 'carto-dark':return CARTO('dark-matter-gl-style');
  case 'osm':return osmStyle();
  case 'vworld-base':return KEYS.vworld?vworldStyle('Base',false):null;
  case 'vworld-white':return KEYS.vworld?vworldStyle('white',false):null;
  case 'vworld-midnight':return KEYS.vworld?vworldStyle('midnight',false):null;
  case 'vworld-satellite':return KEYS.vworld?vworldStyle('Satellite',true):null;
  default:return CARTO('positron-gl-style');}}

/* ---------- 상태/데이터 ---------- */
let DATA={iso:null,sgg:null,hosp:null,hospiso:null,hasBivar:false};
let PYR=null, view='iso', map, pyChart=null;
let selHosps=new Set(), ptMarker=null, ptBusy=false, ptIsoData=null;

async function loadData(){
  const get=async u=>{try{const r=await fetch(u);return r.ok?await r.json():null;}catch(e){return null;}};
  DATA.hosp=await get('data/hospitals.geojson');
  DATA.iso=await get('data/isochrones.geojson');
  DATA.hospiso=await get('data/hospital_isochrones.geojson');
  const bv=await get('data/sigungu_bivariate.geojson');
  DATA.hasBivar=!!bv; DATA.sgg=bv||await get('data/sigungu.geojson');
  DATA.emg=await get('data/emergency.geojson');
  PYR=await get('data/pop_pyramid.json');
}

function addAppLayers(){
  if(!map.getStyle())return;
  let before; for(const l of map.getStyle().layers){if(l.type==='symbol'){before=l.id;break;}}
  const add=(s,d)=>{if(d&&!map.getSource(s))map.addSource(s,{type:'geojson',data:d});};
  add('sgg',DATA.sgg);add('iso',DATA.iso);add('hosp',DATA.hosp);add('hospiso',DATA.hospiso);
  if(!map.getSource('ptiso'))map.addSource('ptiso',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  const op=document.getElementById('opacity').value/100;

  if(DATA.sgg&&!map.getLayer('sgg-aging'))map.addLayer({id:'sgg-aging',type:'fill',source:'sgg',layout:{visibility:'none'},
    paint:{'fill-color':['step',['get','aging_index'],AGING[0],150,AGING[1],250,AGING[2],400,AGING[3]],'fill-opacity':op}},before);
  if(DATA.sgg&&DATA.hasBivar&&!map.getLayer('sgg-bivar')){
    const tp=document.getElementById('toggle-traffic').checked?'bivar_class_tmap':'bivar_class';
    map.addLayer({id:'sgg-bivar',type:'fill',source:'sgg',layout:{visibility:'none'},paint:{'fill-color':bivarMatch(tp),'fill-opacity':op}},before);}
  if(DATA.sgg&&!map.getLayer('sgg-checkup'))map.addLayer({id:'sgg-checkup',type:'fill',source:'sgg',layout:{visibility:'none'},
    paint:{'fill-color':checkupMatch,'fill-opacity':op}},before);
  if(DATA.sgg&&!map.getLayer('sgg-cancer'))map.addLayer({id:'sgg-cancer',type:'fill',source:'sgg',layout:{visibility:'none'},
    paint:{'fill-color':classMatch('cancer_rate',CHECKUP),'fill-opacity':op}},before);

/* ---------- 커버리지 인구 집계(point-in-polygon) ---------- */
function _pip(pt, geom){
  const inRing=(rings)=>{let ins=false;const[x,y]=pt;
    for(const ring of rings){for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
      if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))ins=!ins;}
      break;} // 외곽 ring만(구멍 무시 — 등시선엔 구멍 거의 없음)
    return ins;};
  if(geom.type==='Polygon')return inRing(geom.coordinates);
  if(geom.type==='MultiPolygon')return geom.coordinates.some(poly=>inRing(poly));
  return false;
}
function _maxRing(features){ // hosp_id별 최대(60분) 등시선만
  const best={};
  features.forEach(f=>{const id=f.properties.hosp_id,v=f.properties.value||f.properties.minutes*60||0;
    if(!(id in best)||v>best[id].v)best[id]={v,f};});
  return Object.values(best).map(o=>o.f);
}
function coverageStats(){
  if(!DATA.hospiso||!DATA.sgg||!selHosps.size&&!ptMarker)return null;
  const sel=new Set(selHosps);
  const hpolys=_maxRing((DATA.hospiso.features||[]).filter(f=>sel.has(f.properties.hosp_id)));
  const ptFeats=ptIsoData||[];
  const ptPoly=ptFeats.length?[ptFeats.reduce((a,b)=>((a.properties.value||0)>=(b.properties.value||0)?a:b))]:[];
  let n=0,pop=0,eld=0,addN=0,addEld=0;
  (DATA.sgg.features||[]).forEach(f=>{
    const c=centroid(f.geometry),p=f.properties;
    const inHosp=hpolys.some(h=>_pip(c,h.geometry));
    const inPt=ptPoly.some(h=>_pip(c,h.geometry));
    if(inHosp||inPt){n++;pop+=(p.pop_total||0);eld+=(p.elderly_pop||0);
      if(inPt&&!inHosp){addN++;addEld+=(p.elderly_pop||0);}}
  });
  const out={n,pop,eld};
  if(ptPoly.length){out.addN=addN;out.addEld=addEld;}
  return out;
}

/* ---------- 클릭 등시선(가상 병원) ---------- */
async function placePoint(lng,lat){
  if(ptBusy)return; ptBusy=true; toast('가상 병원 등시선 계산 중…');
  if(ptMarker)ptMarker.remove();
  ptMarker=new maplibregl.Marker({color:'#e6550d'}).setLngLat([lng,lat]).addTo(map);
  try{
    const direct=!!KEYS.ors;
    const url=direct?'https://api.openrouteservice.org/v2/isochrones/driving-car':`/api/iso?lng=${lng}&lat=${lat}`;
    const opt=direct?{method:'POST',headers:{Authorization:KEYS.ors,'Content-Type':'application/json'},
      body:JSON.stringify({locations:[[lng,lat]],range:[900,1800,2700,3600],range_type:'time'})}:{};
    const r=await fetch(url,opt); if(!r.ok)throw new Error('HTTP '+r.status);
    const gj=await r.json();
    const feats=(gj.features||[]).slice().sort((a,b)=>(b.properties.value||0)-(a.properties.value||0))
      .map(f=>({...f,properties:{...f.properties,minutes:(f.properties.value||0)/60}}));
    map.getSource('ptiso').setData({type:'FeatureCollection',features:feats});
    ptIsoData=feats;
    toast(feats.length?'가상 병원 커버리지 표시':'결과 없음');
  }catch(e){toast('등시선 호출 실패: '+e.message);if(ptMarker){ptMarker.remove();ptMarker=null;}}
  finally{ptBusy=false;applyCoverage();}
}
function clearCoverage(){selHosps.clear();ptIsoData=null;
  if(ptMarker){ptMarker.remove();ptMarker=null;}
  if(map.getSource('ptiso'))map.getSource('ptiso').setData({type:'FeatureCollection',features:[]});
  applyCoverage();}

/* ---------- 인터랙션 ---------- */
const pop=new maplibregl.Popup({closeButton:false,closeOnClick:false,offset:10});
// 피라미드 패널: 시군구에서 벗어나면 지연 후 닫되, 패널(링크 클릭용) 위에 있으면 취소
let pyrHideTimer=null;
const hidePyramid=()=>{document.getElementById('pyramid').style.display='none';};
const schedulePyrHide=()=>{clearTimeout(pyrHideTimer);pyrHideTimer=setTimeout(hidePyramid,180);};
const cancelPyrHide=()=>{clearTimeout(pyrHideTimer);pyrHideTimer=null;};
function wireInteractions(){
  const pyrPanel=document.getElementById('pyramid');
  pyrPanel.addEventListener('mouseenter',cancelPyrHide);
  pyrPanel.addEventListener('mouseleave',hidePyramid);
  map.on('click',e=>{
    // Shift+클릭 → 시군구 비교에 추가(기존 커버리지 클릭과 비충돌)
    if(e.originalEvent&&e.originalEvent.shiftKey){
      const sg=map.queryRenderedFeatures(e.point,{layers:map.getLayer('sgg-hover')?['sgg-hover']:[]});
      if(sg.length)addCompare(sg[0].properties);
      return;
    }
    const hits=map.queryRenderedFeatures(e.point,{layers:map.getLayer('hosp-pt')?['hosp-pt']:[]});
    if(hits.length){const id=hits[0].properties.id;
      if(selHosps.has(id))selHosps.delete(id);else selHosps.add(id);
      applyCoverage();
      toast(selHosps.has(id)?`병원 ${selHosps.size}곳 선택(여러 곳 동시 가능)`:'선택 해제');}
    else placePoint(e.lngLat.lng,e.lngLat.lat);
  });
  map.on('mouseenter','hosp-pt',e=>{map.getCanvas().style.cursor='pointer';const p=e.features[0].properties;
    pop.setLngLat(e.features[0].geometry.coordinates).setHTML(`<div class="pop-name">${p.name}</div><div class="pop-meta">${p.region||''} · ${p.sido||''} · 클릭=커버리지</div>`).addTo(map);});
  map.on('mouseleave','hosp-pt',()=>{map.getCanvas().style.cursor='';pop.remove();});
  const pr=(k,v)=>`<div class="pop-row"><span class="pop-k">${k}</span> <span class="pop-v">${v}</span></div>`;
  map.on('mousemove','sgg-hover',e=>{const p=e.features[0].properties;
    cancelPyrHide();
    let h=`<div class="pop-name">${(p.sido||'')} ${p.name||''}</div>`;
    h+=pr('최근접 상급종합', p.access_min==null?'-':p.access_min+'분 <span style="color:#9ca3af">(자유흐름)</span>');
    h+=pr('교통반영(TMAP)', p.access_min_tmap==null?'-':p.access_min_tmap+'분');
    h+=pr('고령인구(65+)', p.elderly_pop!=null?Number(p.elderly_pop).toLocaleString()+'명':'-');
    h+=pr('고령화지수', p.aging_index??'-');
    h+=pr('건강검진 수검률', p.checkup_rate!=null?p.checkup_rate+'%'+(p.checkup_type?` <span style="color:#dc2626">·${p.checkup_type}</span>`:''):'-');
    h+=pr('암검진 수검률', p.cancer_rate!=null?p.cancer_rate+'%':'-');
    h+=pr('최근접 응급기관', p.er_min!=null?p.er_min+'분'+(p.er_center_min!=null?` <span style="color:#6b7280">· 센터급 ${p.er_center_min}분</span>`:''):'-');
    h+=pr('유질환자율', p.disease_rate!=null?p.disease_rate+'%':'-');
    h+=pr('대사증후군 위험', p.metabolic_rate!=null?p.metabolic_rate+'%':'-');
    h+=pr('관내 상급종합', (p.hosp_sup_cnt??0)+'개');
    h+=pr('관내 종합병원', (p.hosp_gen_cnt??0)+'개');
    pop.setLngLat(e.lngLat).setHTML(h).addTo(map);
    if(p.code)renderPyramid(String(p.code));});
  map.on('mouseleave','sgg-hover',()=>{pop.remove();schedulePyrHide();});
}

/* ---------- 이벤트 ---------- */
document.getElementById('view-seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#view-seg button').forEach(x=>x.classList.toggle('on',x===b));view=b.dataset.view;applyView();scheduleWriteUrl();});
document.getElementById('basemap').addEventListener('change',e=>{const st=basemapStyle(e.target.value);
  if(!st){toast('VWorld 키가 없습니다. config.js에 vworld 키를 넣고 도메인을 등록하세요.');e.target.value='carto-positron';return;}
  map.setStyle(st);
  map.once('idle',addAppLayers);   // 새 배경지도 로드 후 데이터 레이어 재구성(style.load 미발생 대비)
});
document.getElementById('toggle-sgg').addEventListener('change',applySggToggle);
document.getElementById('toggle-hosp').addEventListener('change',applyHospToggle);
document.getElementById('toggle-traffic').addEventListener('change',applyTraffic);
document.getElementById('toggle-ercenter').addEventListener('change',applyErTier);
document.getElementById('toggle-pyramid').addEventListener('change',e=>{if(!e.target.checked)document.getElementById('pyramid').style.display='none';});
document.getElementById('opacity').addEventListener('input',e=>{const o=+e.target.value/100;
  ['iso-fill','sgg-aging','sgg-bivar','sgg-checkup','sgg-cancer','sgg-disease','sgg-metabolic','sgg-er'].forEach(l=>{if(map.getLayer(l))map.setPaintProperty(l,'fill-opacity',o);});});
document.getElementById('sim-clear').addEventListener('click',clearCoverage);

/* ---------- URL 상태 저장/복원 (뷰·중심·줌 공유) ---------- */
let _urlTimer=null;
function writeUrl(){
  if(!map)return;
  const c=map.getCenter();
  const q=new URLSearchParams();
  q.set('v',view);
  q.set('ll',c.lng.toFixed(4)+','+c.lat.toFixed(4));
  q.set('z',map.getZoom().toFixed(2));
  history.replaceState(null,'','#'+q.toString());
}
function scheduleWriteUrl(){clearTimeout(_urlTimer);_urlTimer=setTimeout(writeUrl,400);}
function readUrl(){
  const h=location.hash.replace(/^#/,''); if(!h)return null;
  const q=new URLSearchParams(h); const out={};
  if(q.get('v'))out.view=q.get('v');
  if(q.get('ll')){const[a,b]=q.get('ll').split(',').map(Number);if(isFinite(a)&&isFinite(b))out.center=[a,b];}
  if(q.get('z')&&isFinite(+q.get('z')))out.zoom=+q.get('z');
  return out;
}

/* ---------- 검색(시군구·병원) + 점프 ---------- */
function searchIndex(){
  const items=[];
  (DATA.sgg&&DATA.sgg.features||[]).forEach(f=>{const p=f.properties;
    items.push({type:'시군구',name:(p.sido?p.sido+' ':'')+p.name,code:p.code,feature:f});});
  (DATA.hosp&&DATA.hosp.features||[]).forEach(f=>{const p=f.properties;
    items.push({type:'병원',name:p.name||p.yadmNm||'병원',feature:f});});
  return items;
}
function centroid(geom){
  if(geom.type==='Point')return geom.coordinates;
  let xs=0,ys=0,k=0;const walk=cs=>{cs.forEach(c=>{if(typeof c[0]==='number'){xs+=c[0];ys+=c[1];k++;}else walk(c);});};
  walk(geom.coordinates);return k?[xs/k,ys/k]:[127.8,36.3];
}
function wireSearch(){
  const inp=document.getElementById('searchInput'),list=document.getElementById('searchList');
  if(!inp)return;
  let idx=null;
  function ensure(){if(!idx)idx=searchIndex();return idx;}
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toLowerCase();
    if(q.length<1){list.hidden=true;return;}
    const hits=ensure().filter(it=>it.name.toLowerCase().includes(q)).slice(0,8);
    list.innerHTML=hits.map((h,i)=>`<div class="s-item" data-i="${i}"><b>${h.name}</b> <span class="s-t">${h.type}</span></div>`).join('')||'<div class="s-empty">결과 없음</div>';
    list._hits=hits;list.hidden=false;
  });
  list.addEventListener('click',e=>{const it=e.target.closest('.s-item');if(!it)return;
    const h=list._hits[+it.dataset.i];if(!h)return;
    const c=centroid(h.feature.geometry);
    map.flyTo({center:c,zoom:h.type==='병원'?11:9.5});
    list.hidden=true;inp.value=h.name;
    if(h.type==='시군구'&&h.code)renderPyramid(String(h.code));
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))list.hidden=true;});
}

/* ---------- 두 지역 비교(Shift+클릭) ---------- */
let cmpList=[];
const CMP_ROWS=[
  ['access_min','최근접 상급종합(분)',1,'low'],
  ['access_min_tmap','교통반영(분)',1,'low'],
  ['aging_index','고령화지수',0,'low'],
  ['elderly_pop','고령인구(65+)',0,'low'],
  ['hosp_gen_cnt','관내 종합병원',0,'high'],
  ['checkup_rate','건강검진 수검률(%)',1,'high'],
  ['cancer_rate','암검진 수검률(%)',1,'high'],
  ['disease_rate','유질환자율(%)',1,'low'],
  ['metabolic_rate','대사증후군(%)',1,'low'],
  ['er_min','최근접 응급(분)',1,'low'],
];
function addCompare(p){
  if(cmpList.find(x=>x.code===p.code)){toast('이미 비교 중입니다.');return;}
  cmpList.push(p); if(cmpList.length>2)cmpList.shift();  // 최근 2개 유지
  renderCompare();
  toast(cmpList.length<2?'한 곳 더 Shift+클릭하면 비교됩니다':'두 지역 비교 표시');
}
function renderCompare(){
  const panel=document.getElementById('cmpPanel'),body=document.getElementById('cmpBody');
  if(!cmpList.length){panel.hidden=true;return;}
  panel.hidden=false;
  const A=cmpList[0],B=cmpList[1];
  const num=(v,d)=>v==null?'-':Number(v).toLocaleString('ko-KR',{maximumFractionDigits:d});
  let h=`<table class="cmp-tbl"><tr><th></th><th>${A.name}</th>${B?`<th>${B.name}</th>`:'<th class="cmp-hint">Shift+클릭</th>'}</tr>`;
  CMP_ROWS.forEach(([k,label,d,better])=>{
    const a=A[k],b=B?B[k]:null;
    let aw='',bw='';
    if(B&&a!=null&&b!=null&&a!==b){const aBetter=(better==='high')?(a>b):(a<b);
      aw=aBetter?'cmp-good':'cmp-bad';bw=aBetter?'cmp-bad':'cmp-good';}
    h+=`<tr><td class="cmp-k">${label}</td><td class="${aw}">${num(a,d)}</td>${B?`<td class="${bw}">${num(b,d)}</td>`:'<td>-</td>'}</tr>`;
  });
  h+='</table>';
  body.innerHTML=h;
}

/* ---------- 현재 뷰 CSV 내보내기 ---------- */
function exportViewCsv(){
  if(!DATA.sgg)return;
  const cols=[['code','코드'],['sido','시도'],['name','시군구'],['access_min','접근분ORS'],
    ['access_min_tmap','접근분TMAP'],['aging_index','고령화지수'],['elderly_pop','고령인구'],
    ['hosp_gen_cnt','종합병원'],['hosp_sup_cnt','상급종합'],['checkup_rate','건강검진수검률'],
    ['cancer_rate','암검진수검률'],['disease_rate','유질환율'],['metabolic_rate','대사증후군'],
    ['er_min','응급접근분'],['pop_total','총인구']];
  const esc=v=>{v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const head=cols.map(c=>c[1]).join(',');
  const body=DATA.sgg.features.map(f=>cols.map(c=>esc(f.properties[c[0]])).join(',')).join('\n');
  const blob=new Blob(['﻿'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='sigungu_medical_indicators.csv';document.body.appendChild(a);a.click();
  document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}

/* ---------- 내 위치 → 최근접 상급종합병원 ---------- */
function myNearestHospital(){
  if(!navigator.geolocation){toast('이 브라우저는 위치 기능을 지원하지 않습니다.');return;}
  if(!DATA.hosp){toast('병원 데이터가 없습니다.');return;}
  toast('위치 확인 중…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const me=[pos.coords.longitude,pos.coords.latitude];
    const hav=(a,b)=>{const R=6371,dl=(b[1]-a[1])*Math.PI/180,dn=(b[0]-a[0])*Math.PI/180,
      la1=a[1]*Math.PI/180,la2=b[1]*Math.PI/180;
      const x=Math.sin(dl/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dn/2)**2;
      return 2*R*Math.asin(Math.sqrt(x));};
    let best=null,bd=1e9;
    DATA.hosp.features.forEach(f=>{const d=hav(me,f.geometry.coordinates);if(d<bd){bd=d;best=f;}});
    if(!best){toast('병원을 찾지 못했습니다.');return;}
    map.flyTo({center:best.geometry.coordinates,zoom:10});
    if(best.properties&&best.properties.id!=null){selHosps.add(best.properties.id);applyCoverage();}
    toast(`최근접: ${best.properties.name||'상급종합병원'} (직선 ${bd.toFixed(1)}km)`);
  },()=>toast('위치 권한이 거부되었습니다.'),{enableHighAccuracy:true,timeout:8000});
}

(async()=>{
  await loadData();
  const u=readUrl();
  if(u&&u.view)view=u.view;
  map=new maplibregl.Map({container:'map',style:basemapStyle('carto-positron'),
    center:(u&&u.center)||[127.8,36.3],zoom:(u&&u.zoom)||6.4,minZoom:5,maxZoom:14,
    boxZoom:false,
    preserveDrawingBuffer:true,
    localIdeographFontFamily:"'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"});
  window.map=map;
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');
  map.addControl(new maplibregl.FullscreenControl({container:document.getElementById('app')}),'bottom-right');
  map.addControl(new maplibregl.ScaleControl({maxWidth:120,unit:'metric'}),'bottom-right');
  map.on('style.load',addAppLayers);
  map.on('moveend',scheduleWriteUrl);
  window.addEventListener('resize',()=>{if(pyChart)pyChart.resize();});
  wireInteractions();
  wireSearch();
  document.getElementById('exportCsv').addEventListener('click',exportViewCsv);
  document.getElementById('myloc').addEventListener('click',myNearestHospital);
  document.getElementById('cmpClear').addEventListener('click',()=>{cmpList=[];renderCompare();});
  // URL의 view를 토글 버튼에도 반영
  document.querySelectorAll('#view-seg button').forEach(x=>x.classList.toggle('on',x.dataset.view===view));
  const n=DATA.hosp&&DATA.hosp.features?DATA.hosp.features.length:0;
  if(n)document.getElementById('badge-hosp').textContent=`병원 ${n}개소 · 제5기 공식`;
})();
