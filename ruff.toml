# korea-medical-analysis 린트 설정.
# 데이터 스크립트는 의도적으로 압축적(한 줄 다중 문장/람다) 스타일을 쓴다 → 해당 스타일 코드는 무시.
# 단 pyflakes(F: 미사용 import/변수, 빈 f-string 등 실질 버그성)는 유지한다.
target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = [
  "E701",  # multiple statements on one line (colon)
  "E702",  # multiple statements on one line (semicolon)
  "E731",  # lambda assignment (의도적 짧은 헬퍼)
  "E741",  # ambiguous variable name
  "E401",  # multiple imports on one line
  "E501",  # line too long
]
